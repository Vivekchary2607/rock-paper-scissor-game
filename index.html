<!DOCTYPE html>

    <title>Rock-Paper-Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main >
        <h1>Rock Paper Scissor</h1>
        <img src="C:\Users\G Supriya\Desktop\vivek\javascript_practice\Rock-Paper-Scissor\images\title.png" width="600px" height="150px">
        <div class="container">
            <div class="game">
                <button class="box" id="rock"><img id="image" src="C:\Users\G Supriya\Desktop\vivek\javascript_practice\Rock-Paper-Scissor\images\rock.png" alt="Rock">Rock</button>
                <button class="box" id="paper"><img id="image" src="C:\Users\G Supriya\Desktop\vivek\javascript_practice\Rock-Paper-Scissor\images\paper.png" alt="Paper">Paper</button>
                <button class="box" id="scissor"><img id="image" src="C:\Users\G Supriya\Desktop\vivek\javascript_practice\Rock-Paper-Scissor\images\scissor.png" alt="Scissor">Scissor</button>
                <div class="player">
                <img id="imagee" src="C:\Users\G Supriya\Desktop\vivek\javascript_practice\Rock-Paper-Scissor\images\Human.png" alt="Human">

                </div>
                <div class="player">
